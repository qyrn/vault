<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vault - Hub de ressources cybersécurité</title>
<meta name="description" content="Vault est un hub de ressources cybersécurité. Découvrez des outils, guides, CTF, blogs et formations pour apprendre la sécurité informatique.">
<meta name="keywords" content="cybersécurité, hacking, CTF, pentest, sécurité informatique, ressources, outils, formation, bug bounty">
<meta name="author" content="Qyrn">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#08080d">
<link rel="canonical" href="https://vault.qyrn.dev/">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="opengraph-image.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://vault.qyrn.dev/">
<meta property="og:title" content="Vault - Hub de ressources cybersécurité">
<meta property="og:description" content="Découvrez des outils, guides, CTF, blogs et formations pour apprendre la cybersécurité.">
<meta property="og:image" content="https://vault.qyrn.dev/opengraph-image.png">
<meta property="og:image:width" content="600">
<meta property="og:image:height" content="302">
<meta property="og:locale" content="fr_FR">
<meta property="og:site_name" content="Vault">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Vault - Hub de ressources cybersécurité">
<meta name="twitter:description" content="Découvrez des outils, guides, CTF, blogs et formations pour apprendre la cybersécurité.">
<meta name="twitter:image" content="https://vault.qyrn.dev/opengraph-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="vault.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Vault",
  "url": "https://vault.qyrn.dev/",
  "description": "Hub de ressources cybersécurité",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://vault.qyrn.dev/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-tl"></div>
<div class="glow-br"></div>
<div class="container">
  <header>
    <div class="header-left">
      <div class="label">// cybersecurity resource hub</div>
      <div class="header-title"><a id="vaultTitle" href="#"><h1>Vault</h1></a></div>
      <div class="header-stats">
        <span class="stat"><strong id="totalCount">0</strong> ressources</span>
        <span class="stat"><strong id="catCount">0</strong> catégories</span>
      </div>
    </div>
    <div class="header-right">
      <div class="auth-zone" id="authZone"></div>
      <div class="clock">
        <div class="clock-time" id="clockTime"></div>
        <div class="clock-date" id="clockDate"></div>
      </div>
    </div>
  </header>
  <div class="toolbar">
    <div class="search-bar">
      <span class="search-icon"><i data-lucide="search"></i></span>
      <input type="text" id="search" placeholder="Rechercher une ressource, un tag..." autocomplete="off">
      <span class="search-hint">/</span>
    </div>
    <div class="toolbar-btns">
      <button class="btn-tool" id="btnRandom"><i data-lucide="shuffle"></i> Random</button>
      <button class="btn-tool btn-add admin-only" id="btnAdd" style="display:none">+ Ajouter</button>
    </div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div id="content"></div>
  <div class="empty" id="empty"><div class="icon"><i data-lucide="search"></i></div><span id="emptyQuery"></span></div>
</div>
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>+ Nouvelle ressource</h3>
    <label>Nom</label>
    <input type="text" id="fName" placeholder="Ex: HackTricks">
    <label>URL</label>
    <input type="text" id="fUrl" placeholder="https://...">
    <button class="btn-fetch" id="btnFetch"><i data-lucide="loader"></i> Analyser avec l'IA</button>
    <div class="fetch-status" id="fetchStatus"></div>
    <label>Catégorie</label>
    <select id="fCategory"></select>
    <label>Tag</label>
    <input type="text" id="fTag" placeholder="Ex: Outil, CTF, Blog...">
    <label>Difficulté</label>
    <select id="fDifficulty">
      <option value="">Aucune</option>
      <option value="Débutant">Débutant</option>
      <option value="Intermédiaire">Intermédiaire</option>
      <option value="Avancé">Avancé</option>
    </select>
    <label>Description</label>
    <textarea id="fDesc" placeholder="Description de la ressource..."></textarea>
    <label class="checkbox-label">
      <input type="checkbox" id="fPrivate">
      <span>Ressource privée (visible uniquement par moi)</span>
    </label>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelAdd">Annuler</button>
      <button class="btn-save" id="btnSaveAdd">Ajouter</button>
    </div>
  </div>
</div>
<div class="img-modal" id="imgModal">
  <button class="img-close" id="imgClose"><i data-lucide="x"></i></button>
  <img src="https://i.imgur.com/iPY8RJF.png" alt="Cyber Security Acronyms">
</div>
<div class="ctx-menu" id="ctxMenu">
  <button data-action="edit">Éditer</button>
  <button data-action="delete">Supprimer</button>
  <button data-action="copy">Copier URL</button>
</div>
<div class="modal-overlay" id="confirmModal">
  <div class="modal modal-confirm">
    <h3>Confirmer la suppression</h3>
    <p id="confirmMsg">Supprimer cette ressource ?</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelConfirm">Annuler</button>
      <button class="btn-delete" id="btnConfirmDelete">Supprimer</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="randomModal">
  <div class="modal modal-random">
    <h3><i data-lucide="shuffle"></i> Random Challenge</h3>
    <div id="randomContent"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnRandomClose">Fermer</button>
      <button class="btn-tool" id="btnRandomAgain"><i data-lucide="shuffle"></i> Autre</button>
      <a class="btn-save" id="btnRandomOpen" href="#" target="_blank" rel="noopener noreferrer">Ouvrir</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="vault.js"></script>
</body>
</html>
